<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SetFlow</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111314;
        color: #fff;
      }

      main {
        width: min(720px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(48px, 12vw, 96px);
        line-height: 0.9;
      }

      p {
        color: rgba(255, 255, 255, 0.76);
        font-size: 18px;
        line-height: 1.6;
      }

      a {
        color: #58c884;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SetFlow</h1>
      <p>A DJ-style tracklist analyzer and set generator prototype.</p>
      <p>
        BPM and key data powered by
        <a href="https://getsongbpm.com" target="_blank" rel="noopener">
          GetSongBPM
        </a>.
      </p>
    </main>
  </body>
</html>
